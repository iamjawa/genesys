<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESYS — Test Runner</title>
<style>
  body { font: 14px/1.5 system-ui,sans-serif; background: #0d1117; color: #e6edf3; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.2rem; margin-bottom: .5rem; }
  #summary { display: flex; gap: 1rem; margin-bottom: 1rem; font-size: .9rem; }
  .pass { color: #2ea043; }
  .fail { color: #f85149; }
  #results { font-family: monospace; font-size: .82rem; }
  #results li { padding: .15rem 0; }
  #results li.fail { color: #f85149; }
  .suite { font-weight: 700; margin-top: .75rem; color: #8b949e; font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; }
</style>
</head>
<body>
<h1>GENESYS Test Runner</h1>
<div id="summary"><span id="pass-count">0</span> passed · <span id="fail-count">0</span> failed</div>
<ol id="results"></ol>

<script src="../js/genetics.js"></script>
<script src="../js/organisms.js"></script>
<script src="../js/discovery-tracker.js"></script>
<script src="../js/codec.js"></script>
<script>
// ── Minimal assertion framework ────────────────────────────────────
var passed = 0, failed = 0;
var log = document.getElementById('results');
var passCount = document.getElementById('pass-count');
var failCount = document.getElementById('fail-count');

function suite(name) {
  var li = document.createElement('li');
  li.className = 'suite';
  li.textContent = name;
  log.appendChild(li);
}

function assert(ok, msg) {
  var li = document.createElement('li');
  if (ok) { passed++; li.className = 'pass'; li.textContent = '\u2713 ' + msg; }
  else { failed++; li.className = 'fail'; li.textContent = '\u2717 ' + msg; }
  log.appendChild(li);
  passCount.textContent = passed;
  failCount.textContent = failed;
}

function is(actual, expected, msg) {
  assert(actual === expected, msg + ' \u2014 expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(actual));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Genetics: expressGene
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('expressGene');

is(expressGene('color', 'R', 'W').trait, 'Red', 'R+W = Red (dominant)');
is(expressGene('color', 'R', 'R').trait, 'Red', 'R+R = Red (both dominant)');
is(expressGene('color', 'W', 'W').trait, 'White', 'W+W = White (both recessive)');
is(expressGene('pattern', 'S', 'T').trait, 'Solid', 'S+T = Solid (dominant)');
is(expressGene('pattern', 'T', 'T').trait, 'Striped', 'T+T = Striped');
is(expressGene('shape', 'O', 'P').trait, 'Round', 'O+P = Round');
is(expressGene('shape', 'P', 'P').trait, 'Pointed', 'P+P = Pointed');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Genetics: calculateRarity
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('calculateRarity');

is(calculateRarity({
  color:   { allele1: 'R', allele2: 'R' },
  pattern: { allele1: 'S', allele2: 'S' },
  shape:   { allele1: 'O', allele2: 'O' },
}), 1, 'dominant homozygote = Common (1)');

is(calculateRarity({
  color:   { allele1: 'W', allele2: 'W' },
  pattern: { allele1: 'T', allele2: 'T' },
  shape:   { allele1: 'P', allele2: 'P' },
}), 2, 'recessive homozygote = Uncommon (2)');

is(calculateRarity({
  color:   { allele1: 'R', allele2: 'G' },
  pattern: { allele1: 'S', allele2: 'S' },
  shape:   { allele1: 'O', allele2: 'O' },
}), 3, 'mutation present = Rare (3)');

is(calculateRarity({
  color:   { allele1: 'G', allele2: 'G' },
  pattern: { allele1: 'S', allele2: 'S' },
  shape:   { allele1: 'O', allele2: 'O' },
}), 5, 'homozygous mutation = Legendary (5)');

is(getRarityLabel(1), 'Common', 'label for 1');
is(getRarityLabel(2), 'Uncommon', 'label for 2');
is(getRarityLabel(3), 'Rare', 'label for 3');
is(getRarityLabel(5), 'Legendary', 'label for 5');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Genetics: breed
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('breed');

function makeParent(c1,c2,p1,p2,s1,s2) {
  return { genome: { color:{allele1:c1,allele2:c2}, pattern:{allele1:p1,allele2:p2}, shape:{allele1:s1,allele2:s2} } };
}

var r = breed(makeParent('R','R','S','S','O','O'), makeParent('W','W','T','T','P','P'));
assert(r.genome.color.allele1 !== undefined, 'genome has color allele1');
assert(r.genome.pattern.allele2 !== undefined, 'genome has pattern allele2');
assert(r.genome.shape.allele1 !== undefined, 'genome has shape allele1');
assert(typeof r.phenotype.color === 'string', 'phenotype.color is string');

var r2 = breed(makeParent('R','R','S','S','O','O'), makeParent('R','R','S','S','O','O'));
is(r2.phenotype.color, 'Red', 'RR+RR = Red');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Genetics: getAllAllelesForGene
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('getAllAllelesForGene');

var allC = getAllAllelesForGene('color');
assert(Object.keys(allC).length === 5, '5 color alleles (R,W,G,B,P)');
is(allC['R'].trait, 'Red', 'R = Red');
is(allC['W'].trait, 'White', 'W = White');
is(allC['G'].trait, 'Green', 'G = Green');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DiscoveryTracker
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('DiscoveryTracker');

function mockOrg(genome) {
  return { genome: JSON.parse(JSON.stringify(genome)), phenotype:{color:'Red',pattern:'Solid',shape:'Round'}, name:'T', id:'t1', parents:[], generation:0, rarityScore:1, rarityLabel:'Common', discovered:Date.now(), mutations:[] };
}

// Empty tracker
var t1 = new DiscoveryTracker();
var a1 = t1.getAll();
assert(a1.total > 0, 'total alleles > 0');
is(a1.seen, 0, 'seen = 0 when empty');

// Record organism
var t2 = new DiscoveryTracker();
t2.record(mockOrg({ color:{allele1:'R',allele2:'R'}, pattern:{allele1:'S',allele2:'T'}, shape:{allele1:'O',allele2:'P'} }));
var d2 = t2.getDiscovered();
assert(d2.color.hasOwnProperty('R'), 'color R discovered');
assert(d2.pattern.hasOwnProperty('S'), 'pattern S discovered');
assert(d2.pattern.hasOwnProperty('T'), 'pattern T discovered');
assert(d2.shape.hasOwnProperty('O'), 'shape O discovered');
assert(d2.shape.hasOwnProperty('P'), 'shape P discovered');

// Record returns true/false
var t3 = new DiscoveryTracker();
var org3 = mockOrg({ color:{allele1:'R',allele2:'R'}, pattern:{allele1:'S',allele2:'S'}, shape:{allele1:'O',allele2:'O'} });
assert(t3.record(org3) === true, 'first record returns true');
assert(t3.record(org3) === false, 'duplicate record returns false');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// OrganismStore: rename
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('OrganismStore.rename');

// Fresh store for rename tests (isolated)
localStorage.removeItem('gensys_organisms');
var renameStore = new OrganismStore();
var renameOrg = renameStore.getAll()[0];
var renameId = renameOrg.id;

renameStore.rename(renameId, 'MyCustomName');
is(renameStore.getById(renameId).name, 'MyCustomName', 'renames organism by id');

var originalName = renameStore.getById(renameId).name;
renameStore.rename('nonexistent-id', 'ShouldNotAppear');
is(renameStore.getById(renameId).name, originalName, 'nonexistent id does not affect other organisms');

renameStore.rename(renameId, '');
is(renameStore.getById(renameId).name, originalName, 'empty name is ignored');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// OrganismStore: remove
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('OrganismStore.remove');

localStorage.removeItem('gensys_organisms');
var deleteStore = new OrganismStore();
var allBefore = deleteStore.getAll();
var targetId = allBefore[0].id;
var otherId = allBefore[1].id;

deleteStore.remove(targetId);
is(deleteStore.getAll().length, allBefore.length - 1, 'removes one organism');
is(deleteStore.getById(targetId), null, 'removed organism no longer found');
is(deleteStore.getById(otherId).name, allBefore[1].name, 'other organism remains');

deleteStore.remove('absolutely-not-real');
is(deleteStore.getAll().length, allBefore.length - 1, 'removing nonexistent id does nothing');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// OrganismStore: getAllSorted
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('OrganismStore.getAllSorted');

localStorage.removeItem('gensys_organisms');
var sortStore = new OrganismStore();
var sortOrgs = sortStore.getAll();
sortOrgs[0].name = 'Zara';
sortOrgs[1].name = 'Able';
// Leave remaining starters with their default names

var byName = sortStore.getAllSorted('name');
is(byName.length, 4, 'returns all 4 organisms');
is(byName[0].name, 'Able', 'Able comes first alphabetically');
is(byName[byName.length - 1].name, 'Zara', 'Zara comes last alphabetically');

// Create organisms with different rarity for sorting test
localStorage.removeItem('gensys_organisms');
var rarityStore = new OrganismStore();
var commonOrg = rarityStore.getAll()[0];
var rareOrg = rarityStore.getAll()[1];
rareOrg.rarityScore = 3;
rareOrg.rarityLabel = 'Rare';

var byRarity = rarityStore.getAllSorted('rarityScore');
is(byRarity[0].rarityScore, 3, 'higher rarity comes first');
is(byRarity[1].rarityScore, 1, 'lower rarity comes second');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// OrganismStore: getLineage
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('OrganismStore.getLineage');

localStorage.removeItem('gensys_organisms');
var lineageStore = new OrganismStore();
var rose = lineageStore.getAll()[0];
var lily = lineageStore.getAll()[1];

var roseLineage = lineageStore.getLineage(rose.id);
is(roseLineage.length, 0, 'starter organism has empty lineage');

// Manually create an offspring referencing the starters
var baby = createOrganism(
  { color:{allele1:'R',allele2:'W'}, pattern:{allele1:'S',allele2:'T'}, shape:{allele1:'O',allele2:'P'} },
  [rose.id, lily.id], 1
);
lineageStore.add(baby);

var babyLineage = lineageStore.getLineage(baby.id);
is(babyLineage.length, 2, 'offspring lineage contains both parents');
is(babyLineage[0].name, rose.name, 'first parent in lineage is correct');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Starter organisms
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('Starter organisms');

localStorage.removeItem('gensys_organisms');
var starterStore = new OrganismStore();
is(starterStore.getCount(), 4, 'new store has 4 starter organisms');

// Verify each starter has a valid genome
var allStarters = starterStore.getAll();
for (var si = 0; si < allStarters.length; si++) {
  var s = allStarters[si];
  assert(s.genome.color.allele1 && s.genome.color.allele2, s.name + ' has color alleles');
  assert(s.genome.pattern.allele1 && s.genome.pattern.allele2, s.name + ' has pattern alleles');
  assert(s.genome.shape.allele1 && s.genome.shape.allele2, s.name + ' has shape alleles');
  assert(s.phenotype.color, s.name + ' has expressed color');
  is(s.generation, 0, s.name + ' is generation 0');
}

// Verify starter diversity — at least 3 distinct color phenotypes among them
var colorSet = {};
for (var si2 = 0; si2 < allStarters.length; si2++) {
  colorSet[allStarters[si2].phenotype.color] = true;
}
assert(Object.keys(colorSet).length >= 2, 'starters include at least 2 different colors');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// getRarityBreakdown
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('getRarityBreakdown');

var commonGenome = { color:{allele1:'R',allele2:'R'}, pattern:{allele1:'S',allele2:'S'}, shape:{allele1:'O',allele2:'O'} };
var commonBreakdown = getRarityBreakdown(commonGenome);
assert(commonBreakdown.length === 0 || commonBreakdown.length === 1, 'common has no rarity factors');
is(calculateRarity(commonGenome), 1, 'common genome scores 1');

var legendaryGenome = { color:{allele1:'G',allele2:'G'}, pattern:{allele1:'S',allele2:'S'}, shape:{allele1:'O',allele2:'O'} };
var legBreakdown = getRarityBreakdown(legendaryGenome);
is(calculateRarity(legendaryGenome), 5, 'legendary genome scores 5');
var hasColorReason = false;
for (var bi = 0; bi < legBreakdown.length; bi++) {
  if (legBreakdown[bi].indexOf('Color') !== -1) hasColorReason = true;
}
assert(hasColorReason, 'legendary breakdown mentions color gene');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Renderer
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('renderOrganismSVG');

// Each shape type should produce unique SVG output
var baseOrg = { id:'test', name:'T', phenotype:{color:'Red',pattern:'Solid',shape:'Round'}, generation:0, rarityScore:1, rarityLabel:'Common', parents:[], discovered:0, mutations:[], genome:{} };
var roundSvg  = renderOrganismSVG(baseOrg, 40);
baseOrg.phenotype.shape = 'Pointed';
var pointedSvg = renderOrganismSVG(baseOrg, 40);
baseOrg.phenotype.shape = 'Heart';
var heartSvg = renderOrganismSVG(baseOrg, 40);
baseOrg.phenotype.shape = 'Star';
var starSvg = renderOrganismSVG(baseOrg, 40);

assert(roundSvg.length > 100, 'round SVG has content');
assert(roundSvg !== pointedSvg, 'round and pointed SVGs differ');
assert(roundSvg !== heartSvg, 'round and heart SVGs differ');
assert(roundSvg !== starSvg, 'round and star SVGs differ');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// OrganismStore: removeMultiple
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('OrganismStore.removeMultiple');

localStorage.removeItem('gensys_organisms');
var bulkStore = new OrganismStore();
var bulkAll = bulkStore.getAll();
var id1 = bulkAll[0].id;
var id2 = bulkAll[1].id;

bulkStore.removeMultiple([id1, id2]);
is(bulkStore.getCount(), 2, 'removed 2 of 4 organisms');
is(bulkStore.getById(id1), null, 'first organism gone');
is(bulkStore.getById(id2), null, 'second organism gone');

// Empty array is safe
var countBefore = bulkStore.getCount();
bulkStore.removeMultiple([]);
is(bulkStore.getCount(), countBefore, 'empty array does nothing');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Legendary Reveal
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('showLegendaryReveal');

var revealOrg = { id:'r1', name:'Test Legendary', phenotype:{color:'Green',pattern:'Solid',shape:'Round'}, genome:{color:{allele1:'G',allele2:'G'}}, generation:3, rarityScore:5, rarityLabel:'Legendary', parents:[], discovered:0, mutations:[] };
// Tool the reveal into the DOM
var revealEl = document.createElement('div');
revealEl.id = 'reveal-test-target';
document.body.appendChild(revealEl);

showLegendaryReveal(revealOrg, revealEl);

// Should create an overlay with the right class
var overlay = revealEl.querySelector('.legendary-overlay');
assert(overlay !== null, 'legendary overlay element exists');

// Should contain the organism name
assert(overlay.textContent.indexOf('Test Legendary') !== -1, 'overlay contains organism name');

// Cleanup
revealEl.innerHTML = '';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// computeBreedingOdds
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('computeBreedingOdds');

function oddsParent(genome) {
  return { genome: JSON.parse(JSON.stringify(genome)) };
}

// RR × WW → 100% Red
var odds1 = computeBreedingOdds(
  oddsParent({ color:{allele1:'R',allele2:'R'}, pattern:{allele1:'S',allele2:'S'}, shape:{allele1:'O',allele2:'O'} }),
  oddsParent({ color:{allele1:'W',allele2:'W'}, pattern:{allele1:'S',allele2:'S'}, shape:{allele1:'O',allele2:'O'} })
);
is(Math.abs(odds1.color.Red - 1) < 0.001, true, 'RR×WW → 100% Red');
is(Math.abs(odds1.color.White - 0) < 0.001, true, 'RR×WW → 0% White');

// RW × RW → 75% Red, 25% White
var odds2 = computeBreedingOdds(
  oddsParent({ color:{allele1:'R',allele2:'W'}, pattern:{alle1:'S',allele2:'S'}, shape:{allele1:'O',allele2:'O'} }),
  oddsParent({ color:{allele1:'R',allele2:'W'}, pattern:{allele1:'S',allele2:'S'}, shape:{allele1:'O',allele2:'O'} })
);
is(Math.abs(odds2.color.Red - 0.75) < 0.001, true, 'RW×RW → 75% Red');
is(Math.abs(odds2.color.White - 0.25) < 0.001, true, 'RW×RW → 25% White');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Polygenic: expressScent
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('expressScent');

function scentOrg(color, pattern) {
  return { genome: { color:{allele1:color,allele2:color}, pattern:{allele1:pattern,allele2:pattern}, shape:{allele1:'O',allele2:'O'} } };
}

is(expressScent(scentOrg('R','S')), 'Sweet', 'Red + Solid = Sweet');
is(expressScent(scentOrg('R','T')), 'Spicy', 'Red + Striped = Spicy');
is(expressScent(scentOrg('W','S')), 'Fresh', 'White + Solid = Fresh');
is(expressScent(scentOrg('W','T')), 'Earthy', 'White + Striped = Earthy');

// Mutation in any gene → Exotic
var mutOrg = { genome: { color:{allele1:'R',allele2:'G'}, pattern:{allele1:'S',allele2:'S'}, shape:{allele1:'O',allele2:'O'} } };
is(expressScent(mutOrg), 'Exotic', 'mutation present = Exotic');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AchievementTracker
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('AchievementTracker');

var achStore = new OrganismStore();
var achTracker = new DiscoveryTracker();
for (var ai = 0; ai < achStore.getAll().length; ai++) achTracker.record(achStore.getAll()[ai]);
var achievements = new AchievementTracker(achStore, achTracker);

var all = achievements.getAll();
assert(all.length > 0, 'has achievements defined');

// Each achievement has expected structure
for (var aj = 0; aj < all.length; aj++) {
  assert(typeof all[aj].id === 'string', 'achievement ' + aj + ' has id');
  assert(typeof all[aj].name === 'string', 'achievement ' + aj + ' has name');
  assert(typeof all[aj].completed === 'boolean', 'achievement ' + aj + ' has completed status');
}

// Fresh store → should have some incomplete and possibly some complete (starters give some progress)
var completedCount = 0;
for (var ak = 0; ak < all.length; ak++) { if (all[ak].completed) completedCount++; }
assert(completedCount < all.length, 'not all achievements completed on fresh store');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Polygenic: expressTexture
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('expressTexture');

function texOrg(shape, pattern) {
  return { genome: { color:{allele1:'R',allele2:'R'}, shape:{allele1:shape,allele2:shape}, pattern:{allele1:pattern,allele2:pattern} } };
}

is(expressTexture(texOrg('O','S')), 'Smooth', 'Round + Solid = Smooth');
is(expressTexture(texOrg('O','T')), 'Ribbed', 'Round + Striped = Ribbed');
is(expressTexture(texOrg('P','S')), 'Sleek', 'Pointed + Solid = Sleek');
is(expressTexture(texOrg('P','T')), 'Spiky', 'Pointed + Striped = Spiky');

// Mutation in shape or pattern → Ethereal
var texMut = { genome: { color:{allele1:'R',allele2:'R'}, shape:{allele1:'H',allele2:'O'}, pattern:{allele1:'S',allele2:'S'} } };
is(expressTexture(texMut), 'Ethereal', 'mutation in shape = Ethereal');

var texMut2 = { genome: { color:{allele1:'R',allele2:'R'}, shape:{allele1:'O',allele2:'O'}, pattern:{allele1:'D',allele2:'S'} } };
is(expressTexture(texMut2), 'Ethereal', 'mutation in pattern = Ethereal');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Synergy Effects
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('getSynergyEffects');

function synOrg(genome, gen) {
  var full = { color:{allele1:genome.color.a1,allele2:genome.color.a2}, pattern:{allele1:genome.pattern.a1,allele2:genome.pattern.a2}, shape:{allele1:genome.shape.a1,allele2:genome.shape.a2} };
  return { genome: JSON.parse(JSON.stringify(full)), phenotype:{color:expressGene('color',full.color.allele1,full.color.allele2).trait,pattern:expressGene('pattern',full.pattern.allele1,full.pattern.allele2).trait,shape:expressGene('shape',full.shape.allele1,full.shape.allele2).trait}, generation:gen||0, id:'s1', name:'Syn', parents:[], rarityScore:1, rarityLabel:'Common', discovered:Date.now(), mutations:[] };
}

// Both gen 0 → Primal
var primalA = synOrg({color:{a1:'R',a2:'R'},pattern:{a1:'S',a2:'S'},shape:{a1:'O',a2:'O'}}, 0);
var primalB = synOrg({color:{a1:'W',a2:'W'},pattern:{a1:'T',a2:'T'},shape:{a1:'P',a2:'P'}}, 0);
var primalFx = getSynergyEffects(primalA, primalB);
var hasPrimal = false;
for (var fi=0;fi<primalFx.length;fi++) { if (primalFx[fi].id==='primal') hasPrimal=true; }
assert(hasPrimal, 'two gen-0 parents trigger Primal effect');

// Different colors → Rainbow
var rainbowA = synOrg({color:{a1:'R',a2:'R'},pattern:{a1:'S',a2:'S'},shape:{a1:'O',a2:'O'}}, 1);
var rainbowB = synOrg({color:{a1:'W',a2:'W'},pattern:{a1:'S',a2:'S'},shape:{a1:'O',a2:'O'}}, 1);
var rainbowFx = getSynergyEffects(rainbowA, rainbowB);
var hasRainbow = false;
for (var fi2=0;fi2<rainbowFx.length;fi2++) { if (rainbowFx[fi2].id==='rainbow') hasRainbow=true; }
assert(hasRainbow, 'different color parents trigger Rainbow effect');

// Same color → no Rainbow
var sameColorA = synOrg({color:{a1:'R',a2:'R'},pattern:{a1:'S',a2:'S'},shape:{a1:'O',a2:'O'}}, 1);
var sameColorB = synOrg({color:{a1:'R',a2:'R'},pattern:{a1:'S',a2:'S'},shape:{a1:'O',a2:'O'}}, 1);
var sameFx = getSynergyEffects(sameColorA, sameColorB);
var hasRainbow2 = false;
for (var fi3=0;fi3<sameFx.length;fi3++) { if (sameFx[fi3].id==='rainbow') hasRainbow2=true; }
assert(!hasRainbow2, 'same color parents do NOT trigger Rainbow');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Codec: encodeOrganismCode / decodeOrganismCode
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
suite('Codec');

var codecOrg = {
  id:'c1', name:'CodecTest',
  phenotype:{color:'Red',pattern:'Solid',shape:'Round'},
  genome:{color:{allele1:'R',allele2:'W'}, pattern:{allele1:'S',allele2:'T'}, shape:{allele1:'O',allele2:'P'}},
  generation:2, rarityScore:1, rarityLabel:'Common', parents:[], discovered:0, mutations:[]
};

var encoded = encodeOrganismCode(codecOrg);
is(typeof encoded, 'string', 'encodeOrganismCode returns a string');
is(encoded.length, 6, 'encoded code is 6 characters');
is(encoded, 'RWSTOP', 'code matches expected 6-char encoding');

var decoded = decodeOrganismCode('RWSTOP');
assert(decoded !== null, 'decodeOrganismCode returns non-null for valid code');
is(decoded.color.allele1, 'R', 'decoded color allele1');
is(decoded.color.allele2, 'W', 'decoded color allele2');
is(decoded.pattern.allele1, 'S', 'decoded pattern allele1');
is(decoded.pattern.allele2, 'T', 'decoded pattern allele2');
is(decoded.shape.allele1, 'O', 'decoded shape allele1');
is(decoded.shape.allele2, 'P', 'decoded shape allele2');

// Round-trip: encode then decode should match original genome
var rtDecoded = decodeOrganismCode(encodeOrganismCode(codecOrg));
assert(rtDecoded !== null, 'round-trip decode is non-null');
is(rtDecoded.color.allele1, codecOrg.genome.color.allele1, 'round-trip color a1');
is(rtDecoded.color.allele2, codecOrg.genome.color.allele2, 'round-trip color a2');
is(rtDecoded.pattern.allele1, codecOrg.genome.pattern.allele1, 'round-trip pattern a1');
is(rtDecoded.pattern.allele2, codecOrg.genome.pattern.allele2, 'round-trip pattern a2');
is(rtDecoded.shape.allele1, codecOrg.genome.shape.allele1, 'round-trip shape a1');
is(rtDecoded.shape.allele2, codecOrg.genome.shape.allele2, 'round-trip shape a2');

// Invalid codes
is(decodeOrganismCode(''), null, 'empty string returns null');
is(decodeOrganismCode('SHORT'), null, 'short string returns null');
is(decodeOrganismCode('TOOLONG!'), null, 'long string returns null');
is(decodeOrganismCode('XXABCD'), null, 'invalid allele returns null');

// Homeozygous encoding
var homoOrg = {
  id:'c2', name:'HomoOrg',
  phenotype:{color:'Red',pattern:'Solid',shape:'Round'},
  genome:{color:{allele1:'R',allele2:'R'}, pattern:{allele1:'S',allele2:'S'}, shape:{allele1:'O',allele2:'O'}},
  generation:0, rarityScore:1, rarityLabel:'Common', parents:[], discovered:0, mutations:[]
};
is(encodeOrganismCode(homoOrg), 'RRSSOO', 'homozygous organism encodes to RRSSOO');

// ── Done ──────────────────────────────────────────────────────────
var total = passed + failed;
document.querySelector('h1').textContent = 'GENESYS Test Runner \u2014 ' + passed + '/' + total + ' passed';
</script>
</body>
</html>
