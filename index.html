<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GENESYS — Genetics Breeder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────────── -->
  <header id="header">
    <div class="logo">
      <h1>GENESYS</h1>
      <span class="tagline">Breed · Discover · Collect</span>
    </div>
    <div class="stats">
      <span>🌿 <span id="stats-count">0</span></span>
      <span>🧬 G<span id="stats-gen">0</span></span>
      <span>⭐ <span id="stats-rarest">—</span></span>
      <span>📖 <span id="stats-completion">0%</span></span>
    </div>
  </header>

  <!-- ─── Main ────────────────────────────────────────────────── -->
  <main id="main">

    <!-- Breeding Station -->
    <section id="breeding-section">
      <h2>🧪 Breeding Station</h2>
      <div class="breeding-panel">
        <div class="parent-slots">
          <div class="parent-slot">
            <label>Parent A</label>
            <select id="parent-a-select"></select>
            <div id="parent-a-preview" class="parent-preview"></div>
          </div>
          <div class="parent-slot">
            <label>Parent B</label>
            <select id="parent-b-select"></select>
            <div id="parent-b-preview" class="parent-preview"></div>
          </div>
        </div>
        <div class="breeding-controls">
          <div class="offspring-count-row">
            <label for="offspring-slider">Offspring:</label>
            <input type="range" id="offspring-slider" min="1" max="5" value="3" class="offspring-slider">
            <span id="offspring-count-label">3</span>
          </div>
          <button id="breed-btn" disabled>🧬 BREED</button>
        </div>
      </div>
      <div id="odds-panel" class="odds-panel"></div>
    </section>

    <!-- Results -->
    <section id="results-section">
      <div id="results"></div>
    </section>

    <!-- Collection -->
    <section id="collection-section">
      <div class="section-header">
        <h2>🌿 Your Collection</h2>
        <div class="header-actions">
          <button id="select-toggle" class="btn btn-sm">Select</button>
          <select id="sort-select" class="sort-select">
            <option value="discovered">Newest</option>
            <option value="name">Name A-Z</option>
            <option value="rarityScore">Rarity</option>
            <option value="generation">Generation</option>
          </select>
        </div>
      </div>
      <div id="bulk-bar" class="bulk-bar hidden">
        <span id="bulk-count">0 selected</span>
        <button id="bulk-delete" class="btn btn-sm btn-delete" disabled>Delete selected</button>
        <button id="bulk-cancel" class="btn btn-sm">Cancel</button>
      </div>
      <div class="import-row">
        <input type="text" id="import-code-input" class="import-input" placeholder="Paste code..." maxlength="6">
        <button id="import-code-btn" class="btn btn-sm">Import</button>
        <span id="import-status" class="import-status"></span>
      </div>
      <div id="collection" class="collection-grid"></div>
    </section>

    <!-- Trait Journal -->
    <section id="journal-section">
      <h2>📖 Trait Journal</h2>
      <div id="journal-body"></div>
    </section>

    <!-- Achievements -->
    <section id="achievements-section">
      <h2>🏆 Achievements</h2>
      <div id="achievements-body" class="achievements-grid"></div>
    </section>

    <!-- Breeding History -->
    <section id="history-section">
      <div class="section-header">
        <h2>📜 Breeding History</h2>
        <button id="clear-history-btn" class="btn btn-sm">Clear</button>
      </div>
      <div id="history-body" class="history-body"></div>
    </section>

  </main>

  <!-- ─── Detail Modal ────────────────────────────────────────── -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="modal-close" class="modal-close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- ─── Notification Container ──────────────────────────────── -->
  <div id="notification" class="notification-container"></div>

  <!-- ─── Scripts ─────────────────────────────────────────────── -->
  <script src="js/genetics.js"></script>
  <script src="js/organisms.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/discovery-tracker.js"></script>
  <script src="js/achievement-tracker.js"></script>
  <script src="js/codec.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
